<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quantum Burnout Analytics{% endblock %}</title>
    <!-- Tailwind CSS (CDN for rapid prototyping) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="text-slate-200 antialiased">
    <nav class="glass-card m-4 px-6 py-4 flex justify-between items-center z-50 relative animate-fade-in">
        <div class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
            NexusMind
        </div>
        <div>
            {% if user %}
            <a href="/dashboard" class="mr-4 hover:text-indigo-300 transition">Dashboard</a>
            <a href="/gosip" class="mr-4 hover:text-indigo-300 transition">Ruang Gosip</a>
            <a href="/terapi" class="mr-4 hover:text-indigo-300 transition">Warung Terapi</a>
            <span class="mr-4 text-sm text-slate-400">Halo, {{ user.nama }}</span>
            <a href="/login" class="text-sm px-4 py-2 rounded-lg glass-input hover:bg-red-500/20 transition">Logout</a>
            {% else %}
            <a href="/login" class="mr-4 hover:text-indigo-300 transition">Login</a>
            <a href="/register" class="btn-primary px-4 py-2 rounded-lg font-medium">Daftar</a>
            {% endif %}
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 relative z-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Decorative background elements -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-900/30 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-900/30 blur-[120px]"></div>
    </div>
</body>
</html>
